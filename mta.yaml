_schema-version: "3.1"
ID: FIEM-report-user2
version: 1.0.0

modules:

  - name: FIEM-report-user2-ui
    type: html5
    path: .
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npm run build
      build-result: approuter/resources
      supported-platforms: []

  - name: fiem-report-user2
    type: approuter.nodejs
    path: approuter
    parameters:
      memory: 256M
      disk-quota: 512M
    requires:
      - name: destination-report-service-user2
      - name: connectivity-report-service-user2
      - name: xsuaa-report-service-user2
    provides:
      - name: approuter-api
        properties:
          url: ${default-url}

resources:

  - name: destination-report-service-user2
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite

  - name: connectivity-report-service-user2
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite

  - name: xsuaa-report-service-user2
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json